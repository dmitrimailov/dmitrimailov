name: Update Profile README

on:
  schedule:
    # Робот будет просыпаться каждый час
    - cron: '0 * * * *'
  workflow_dispatch: # Позволяет запускать робота вручную кнопкой

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate fresh content
        run: |
          echo "### Привет! Я настраиваю свой профиль 👋" > README.md
          echo "" >> README.md
          echo "Этот профиль обновляется автоматически с помощью GitHub Actions." >> README.md
          echo "" >> README.md
          echo "🕒 **Последнее обновление роботом:** $(date -u +'%Y-%m-%d %H:%M:%S') UTC" >> README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add README.md
          git commit -m "🤖 Робот обновил дату в README" || echo "Нет изменений для сохранения"
          git push
